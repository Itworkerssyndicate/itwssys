<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>لوحة التحكم - نظام إدارة النقابة المتكامل | ITWS</title>
    
    <!-- الخطوط الأساسية -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@400;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- FingerprintJS -->
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    
    <style>
        /* =====================================================================
           نظام إدارة النقابة المتكامل - لوحة التحكم
           جميع الحقوق محفوظة لنقابة تكنولوجيا المعلومات والبرمجيات © 2026
           ===================================================================== */
        
        :root {
            --bg-primary: #030514;
            --bg-secondary: #0a0f1f;
            --bg-tertiary: #111827;
            --bg-card: rgba(15, 23, 42, 0.7);
            --bg-sidebar: rgba(3, 5, 20, 0.85);
            --bg-hover: rgba(0, 255, 255, 0.1);
            --bg-input: rgba(3, 5, 20, 0.6);
            
            --neon-cyan: #00ffff;
            --neon-cyan-glow: rgba(0, 255, 255, 0.5);
            --neon-purple: #a855f7;
            --neon-purple-glow: rgba(168, 85, 247, 0.5);
            --neon-pink: #ec4899;
            --neon-pink-glow: rgba(236, 72, 153, 0.5);
            --neon-green: #10b981;
            --neon-green-glow: rgba(16, 185, 129, 0.5);
            --neon-red: #ef4444;
            --neon-red-glow: rgba(239, 68, 68, 0.5);
            --neon-orange: #f97316;
            --neon-orange-glow: rgba(249, 115, 22, 0.5);
            --neon-blue: #3b82f6;
            --neon-blue-glow: rgba(59, 130, 246, 0.5);
            
            --text-primary: #ffffff;
            --text-secondary: #b0c4de;
            --text-muted: #94a3b8;
            
            --border-color: rgba(255, 255, 255, 0.08);
            --border-hover: var(--neon-cyan);
            
            --gradient-primary: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            --gradient-secondary: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
            --gradient-danger: linear-gradient(135deg, var(--neon-red), var(--neon-orange));
            --gradient-success: linear-gradient(135deg, var(--neon-green), var(--neon-cyan));
            --gradient-warning: linear-gradient(135deg, var(--neon-orange), var(--neon-pink));
            
            --shadow-card: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--border-color) inset;
            --shadow-neon: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-purple);
            --shadow-neon-red: 0 0 20px var(--neon-red), 0 0 40px var(--neon-red);
            
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-width: 280px;
            --border-radius: 20px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', 'Cairo', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            direction: rtl;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        /* خلفية متحركة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(236, 72, 153, 0.05) 0%, transparent 50%);
            animation: cosmicWave 20s ease infinite;
            z-index: -2;
            pointer-events: none;
        }
        
        @keyframes cosmicWave {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(168, 85, 247, 0.015) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 30s linear infinite;
            z-index: -1;
            pointer-events: none;
        }
        
        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }
        
        /* جزيئات متطايرة */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--gradient-primary);
            border-radius: 50%;
            animation: particleFloat 20s linear infinite;
            opacity: 0.3;
            box-shadow: 0 0 10px var(--neon-cyan);
        }
        
        @keyframes particleFloat {
            0% { transform: translateY(100vh) translateX(0); opacity: 0.3; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }
        
        /* عناصر عائمة */
        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .floating-element {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.08;
            animation: floatLuxury 20s infinite alternate;
        }
        
        .floating-element:nth-child(1) {
            width: 600px;
            height: 600px;
            top: -200px;
            right: -200px;
            background: var(--neon-cyan);
        }
        
        .floating-element:nth-child(2) {
            width: 700px;
            height: 700px;
            bottom: -250px;
            left: -250px;
            background: var(--neon-purple);
        }
        
        @keyframes floatLuxury {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, -50px) scale(1.1); }
        }
        
        /* القائمة الجانبية */
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--bg-sidebar);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid var(--border-color);
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            z-index: 100;
            box-shadow: -10px 0 50px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .sidebar-logo {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .logo-wrapper {
            width: 80px;
            height: 80px;
            margin: 0 auto 12px;
            position: relative;
        }
        
        .logo-wrapper::after {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--neon-cyan-glow), transparent 70%);
            animation: pulse 2s ease infinite;
            z-index: -1;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        
        .sidebar-logo img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--neon-cyan);
            object-fit: cover;
            box-shadow: 0 0 20px var(--neon-cyan);
        }
        
        .sidebar-title {
            font-size: 16px;
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 3px;
        }
        
        .sidebar-sub {
            color: var(--text-muted);
            font-size: 10px;
        }
        
        /* معلومات المستخدم */
        .user-info {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        
        .user-avatar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        
        .user-avatar i {
            width: 40px;
            height: 40px;
            background: var(--gradient-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .user-avatar h4 {
            font-size: 15px;
            color: var(--neon-cyan);
        }
        
        .user-details p {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }
        
        .role-badge-sm {
            background: rgba(0, 255, 255, 0.15);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 10px;
            color: var(--neon-cyan);
        }
        
        /* أزرار التنقل */
        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .nav-item {
            padding: 10px 12px;
            border: none;
            border-radius: 12px;
            background: transparent;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
            text-align: right;
            width: 100%;
        }
        
        .nav-item i {
            width: 22px;
            color: var(--neon-cyan);
            font-size: 16px;
        }
        
        .nav-item:hover {
            background: var(--bg-hover);
            border-color: var(--neon-cyan);
            transform: translateX(-3px);
        }
        
        .nav-item.active {
            background: var(--gradient-primary);
            box-shadow: 0 0 15px var(--neon-cyan);
        }
        
        .nav-item.active i {
            color: white;
        }
        
        .logout-btn {
            margin-top: auto;
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--neon-red);
        }
        
        .logout-btn i {
            color: var(--neon-red);
        }
        
        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: var(--neon-red);
            box-shadow: 0 0 20px var(--neon-red);
        }
        
        /* المحتوى الرئيسي */
        .main-content {
            margin-right: var(--sidebar-width);
            padding: 25px;
            min-height: 100vh;
            position: relative;
            z-index: 90;
            transition: var(--transition);
        }
        
        /* رأس الصفحة */
        .page-header {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 15px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-card);
        }
        
        .page-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .page-title i {
            font-size: 24px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .page-title h1 {
            font-size: 22px;
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-icon {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 16px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-icon:hover {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            transform: translateY(-2px);
        }
        
        /* بطاقات الإحصائيات */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: var(--transition);
            box-shadow: var(--shadow-card);
        }
        
        .stat-card:hover {
            transform: translateY(-3px);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan);
        }
        
        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
        }
        
        .stat-info h3 {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }
        
        .stat-info p {
            font-size: 24px;
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* قائمة الانتظار للاعتماد */
        .pending-approvals {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: var(--shadow-card);
        }
        
        .section-title {
            color: var(--neon-cyan);
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(0, 255, 255, 0.2);
        }
        
        .approval-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            border-right: 3px solid var(--neon-orange);
            transition: var(--transition);
        }
        
        .approval-item:hover {
            transform: translateX(-5px);
            background: rgba(0, 0, 0, 0.4);
        }
        
        .approval-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .approval-type {
            background: rgba(249, 115, 22, 0.2);
            color: var(--neon-orange);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }
        
        .approval-time {
            color: var(--text-muted);
            font-size: 11px;
        }
        
        .approval-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .approval-from {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        
        .approval-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-approve {
            background: var(--gradient-success);
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .btn-reject {
            background: var(--gradient-danger);
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .btn-approve:hover, .btn-reject:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
        
        /* الرسوم البيانية */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .chart-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: var(--shadow-card);
        }
        
        .chart-title {
            color: var(--neon-cyan);
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        canvas {
            max-height: 220px;
            max-width: 100%;
        }
        
        /* الأنشطة الأخيرة */
        .recent-activities {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: var(--shadow-card);
        }
        
        .activity-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }
        
        .activity-item:last-child {
            border-bottom: none;
        }
        
        .activity-icon {
            width: 35px;
            height: 35px;
            border-radius: 10px;
            background: rgba(0, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        
        .activity-details {
            flex: 1;
        }
        
        .activity-text {
            font-size: 13px;
            margin-bottom: 3px;
        }
        
        .activity-time {
            font-size: 11px;
            color: var(--text-muted);
        }
        
        /* تذييل */
        .footer {
            text-align: center;
            padding: 20px;
            margin-top: 30px;
            color: var(--text-muted);
            font-size: 12px;
        }
        
        /* تحسينات الجوال */
        @media (max-width: 1200px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 992px) {
            .sidebar {
                transform: translateX(100%);
                transition: transform 0.3s ease;
                z-index: 1001;
            }
            .sidebar.show {
                transform: translateX(0);
            }
            .main-content {
                margin-right: 0;
            }
            .menu-toggle {
                display: block;
            }
        }
        
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .page-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            .approval-header {
                flex-direction: column;
            }
        }
        
        .menu-toggle {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1002;
            background: var(--gradient-primary);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            color: white;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 0 20px var(--neon-cyan);
        }
        
        @media (max-width: 992px) {
            .menu-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- زر القائمة للجوال -->
    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>
    
    <!-- جزيئات متطايرة -->
    <div class="particles" id="particles"></div>
    <div class="floating-elements">
        <div class="floating-element"></div>
        <div class="floating-element"></div>
    </div>
    
    <!-- القائمة الجانبية -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <div class="logo-wrapper">
                <img src="https://placehold.co/80x80/0a0f1f/00ffff/png?text=Logo" alt="شعار" id="sidebarLogo">
            </div>
            <h2 class="sidebar-title">نظام إدارة النقابة</h2>
            <p class="sidebar-sub">نقابة تكنولوجيا المعلومات</p>
        </div>
        
        <div class="user-info" id="userInfo">
            <div class="user-avatar">
                <i class="fas fa-user-circle"></i>
                <h4 id="userName">جاري التحميل...</h4>
            </div>
            <div class="user-details">
                <p><span>الدور:</span> <span id="userRole" class="role-badge-sm">...</span></p>
                <p><span>آخر دخول:</span> <span id="userLastLogin">...</span></p>
            </div>
        </div>
        
        <nav class="sidebar-nav">
            <button class="nav-item active" data-page="dashboard">
                <i class="fas fa-chart-pie"></i>
                <span>لوحة التحكم</span>
            </button>
            <button class="nav-item" data-page="notifications">
                <i class="fas fa-bell"></i>
                <span>الإخطارات</span>
            </button>
            <button class="nav-item" data-page="reports">
                <i class="fas fa-file-alt"></i>
                <span>التقارير</span>
            </button>
            <button class="nav-item" data-page="tasks">
                <i class="fas fa-tasks"></i>
                <span>التكليفات</span>
            </button>
            <button class="nav-item" data-page="directions">
                <i class="fas fa-directions"></i>
                <span>التوجيهات</span>
            </button>
            <button class="nav-item" data-page="branches">
                <i class="fas fa-code-branch"></i>
                <span>الفروع</span>
            </button>
            <button class="nav-item" data-page="committees">
                <i class="fas fa-users"></i>
                <span>اللجان</span>
            </button>
            <button class="nav-item" data-page="ratings">
                <i class="fas fa-star"></i>
                <span>التقييمات</span>
            </button>
            <button class="nav-item" data-page="users">
                <i class="fas fa-users-cog"></i>
                <span>إدارة المستخدمين</span>
            </button>
        </nav>
        
        <button class="nav-item logout-btn" id="logoutBtn">
            <i class="fas fa-sign-out-alt"></i>
            <span>خروج آمن</span>
        </button>
    </aside>
    
    <!-- المحتوى الرئيسي -->
    <main class="main-content" id="mainContent">
        <header class="page-header">
            <div class="page-title">
                <i class="fas fa-chart-pie"></i>
                <h1 id="pageTitle">لوحة التحكم الرئيسية</h1>
            </div>
            <div class="header-actions">
                <button class="btn-icon" onclick="refreshData()" title="تحديث">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <button class="btn-icon" onclick="toggleSidebar()" id="menuBtn" title="القائمة">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </header>
        
        <div id="pageContent">
            <!-- المحتوى سيتم تحميله ديناميكياً -->
        </div>
        
        <div class="footer">
            <span>نقابة تكنولوجيا المعلومات والبرمجيات © 2026</span>
            <span style="margin: 0 10px;">|</span>
            <span style="color: var(--neon-cyan); font-family: 'Orbitron', monospace;">VR 2.05.2026</span>
        </div>
    </main>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script>
        // =====================================================================
        // تهيئة Firebase
        // =====================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDfKqDoA5TVqWWCF3M1L1Opj7MuoYmqMN0",
            authDomain: "itwssy.firebaseapp.com",
            databaseURL: "https://itwssy-default-rtdb.firebaseio.com",
            projectId: "itwssy",
            storageBucket: "itwssy.firebasestorage.app",
            messagingSenderId: "459373398439",
            appId: "1:459373398439:web:95772127d406196afb8e82",
            measurementId: "G-ZBBGHCXEEJ"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        db.settings({ cacheSizeBytes: firebase.firestore.CACHE_SIZE_UNLIMITED, ignoreUndefinedProperties: true });
        
        // =====================================================================
        // المتغيرات العامة
        // =====================================================================
        let currentUser = null;
        let isSuperAdmin = false;
        let charts = {};
        let allRequests = {
            notifications: [],
            reports: [],
            tasks: [],
            directions: []
        };
        
        // =====================================================================
        // إنشاء الجزيئات
        // =====================================================================
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 10 + 's';
                p.style.animationDuration = 10 + Math.random() * 20 + 's';
                container.appendChild(p);
            }
        }
        createParticles();
        
        // =====================================================================
        // التحقق من تسجيل الدخول
        // =====================================================================
        function checkAuth() {
            const userStr = localStorage.getItem('currentUser');
            if (!userStr) {
                window.location.href = 'login.html';
                return false;
            }
            try {
                currentUser = JSON.parse(userStr);
                return true;
            } catch(e) {
                window.location.href = 'login.html';
                return false;
            }
        }
        if (!checkAuth()) location.href = 'login.html';
        
        // =====================================================================
        // تحميل معلومات المستخدم
        // =====================================================================
        async function loadUserInfo() {
            document.getElementById('userName').textContent = currentUser.name || currentUser.username;
            document.getElementById('userRole').textContent = getRoleName(currentUser.role);
            document.getElementById('userLastLogin').textContent = currentUser.lastLogin || 'اليوم';
            isSuperAdmin = (currentUser.role === 'super_admin');
            
            // تحميل اللوجو
            const settingsDoc = await db.collection('Settings').doc('system').get();
            if (settingsDoc.exists && settingsDoc.data().logo) {
                document.getElementById('sidebarLogo').src = settingsDoc.data().logo;
            }
        }
        
        function getRoleName(role) {
            const roles = {
                'super_admin': 'النقيب العام',
                'president': 'رئيس النقابة',
                'branch_manager': 'مدير فرع',
                'committee_manager': 'مدير لجنة',
                'member': 'عضو',
                'public_relations': 'لجنة العلاقات العامة'
            };
            return roles[role] || role;
        }
        
        // =====================================================================
        // تحميل البيانات للوحة التحكم
        // =====================================================================
        async function loadDashboardData() {
            document.getElementById('pageContent').innerHTML = `
                <div style="text-align: center; padding: 50px;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 40px; color: var(--neon-cyan);"></i>
                    <p style="margin-top: 15px;">جاري تحميل البيانات...</p>
                </div>
            `;
            
            try {
                // جلب الطلبات المعلقة للاعتماد (للسوبر أدمن فقط)
                let pendingApprovals = [];
                if (isSuperAdmin) {
                    const notificationsSnap = await db.collection('Notifications')
                        .where('status', '==', 'pending_approval')
                        .limit(5)
                        .get();
                    notificationsSnap.forEach(doc => pendingApprovals.push({ id: doc.id, type: 'notification', ...doc.data() }));
                    
                    const reportsSnap = await db.collection('Reports')
                        .where('status', '==', 'pending_approval')
                        .limit(5)
                        .get();
                    reportsSnap.forEach(doc => pendingApprovals.push({ id: doc.id, type: 'report', ...doc.data() }));
                    
                    const tasksSnap = await db.collection('Tasks')
                        .where('status', '==', 'pending_approval')
                        .limit(5)
                        .get();
                    tasksSnap.forEach(doc => pendingApprovals.push({ id: doc.id, type: 'task', ...doc.data() }));
                    
                    const directionsSnap = await db.collection('Directions')
                        .where('status', '==', 'pending_approval')
                        .limit(5)
                        .get();
                    directionsSnap.forEach(doc => pendingApprovals.push({ id: doc.id, type: 'direction', ...doc.data() }));
                    
                    pendingApprovals.sort((a, b) => {
                        const dateA = a.createdAt?.toDate ? a.createdAt.toDate() : new Date(0);
                        const dateB = b.createdAt?.toDate ? b.createdAt.toDate() : new Date(0);
                        return dateB - dateA;
                    });
                }
                
                // إحصائيات سريعة
                const branchesSnap = await db.collection('Branches').get();
                const committeesSnap = await db.collection('Committees').get();
                const usersSnap = await db.collection('Users').get();
                
                const stats = {
                    branches: branchesSnap.size,
                    committees: committeesSnap.size,
                    users: usersSnap.size,
                    pending: pendingApprovals.length
                };
                
                // الأنشطة الأخيرة
                const activitiesSnap = await db.collection('SystemLogs')
                    .orderBy('timestamp', 'desc')
                    .limit(5)
                    .get();
                let activities = [];
                activitiesSnap.forEach(doc => activities.push(doc.data()));
                
                // الرسوم البيانية
                const reportsSnap = await db.collection('Reports').get();
                const reportsByMonth = {};
                reportsSnap.forEach(doc => {
                    const date = doc.data().createdAt?.toDate();
                    if (date) {
                        const month = date.toLocaleString('ar-EG', { month: 'short' });
                        reportsByMonth[month] = (reportsByMonth[month] || 0) + 1;
                    }
                });
                
                const notificationsByType = {};
                const notifSnap = await db.collection('Notifications').get();
                notifSnap.forEach(doc => {
                    const type = doc.data().priority || 'عادي';
                    notificationsByType[type] = (notificationsByType[type] || 0) + 1;
                });
                
                // بناء HTML
                let pendingHTML = '';
                if (pendingApprovals.length > 0) {
                    pendingHTML = `
                        <div class="pending-approvals">
                            <div class="section-title">
                                <i class="fas fa-clock"></i>
                                <span>في انتظار اعتمادك (${pendingApprovals.length})</span>
                            </div>
                            ${pendingApprovals.map(item => `
                                <div class="approval-item">
                                    <div class="approval-header">
                                        <span class="approval-type">${getTypeName(item.type)}</span>
                                        <span class="approval-time">${formatTime(item.createdAt)}</span>
                                    </div>
                                    <div class="approval-title">${item.title || 'بدون عنوان'}</div>
                                    <div class="approval-from">من: ${item.fromName || item.fromId || 'غير محدد'}</div>
                                    <div class="approval-actions">
                                        <button class="btn-approve" onclick="approveItem('${item.id}', '${item.type}')">
                                            <i class="fas fa-check"></i> اعتماد
                                        </button>
                                        <button class="btn-reject" onclick="rejectItem('${item.id}', '${item.type}')">
                                            <i class="fas fa-times"></i> رفض
                                        </button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
                
                const html = `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-code-branch"></i></div>
                            <div class="stat-info"><h3>الفروع</h3><p>${stats.branches}</p></div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-users"></i></div>
                            <div class="stat-info"><h3>اللجان</h3><p>${stats.committees}</p></div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-users-cog"></i></div>
                            <div class="stat-info"><h3>المستخدمين</h3><p>${stats.users}</p></div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon" style="background: linear-gradient(135deg, #f97316, #ec4899);"><i class="fas fa-clock"></i></div>
                            <div class="stat-info"><h3>بانتظار الاعتماد</h3><p>${stats.pending}</p></div>
                        </div>
                    </div>
                    
                    ${pendingHTML}
                    
                    <div class="charts-grid">
                        <div class="chart-card">
                            <div class="chart-title"><i class="fas fa-chart-line"></i> التقارير حسب الشهر</div>
                            <canvas id="reportsChart"></canvas>
                        </div>
                        <div class="chart-card">
                            <div class="chart-title"><i class="fas fa-chart-pie"></i> الإخطارات حسب الأولوية</div>
                            <canvas id="notificationsChart"></canvas>
                        </div>
                    </div>
                    
                    <div class="recent-activities">
                        <div class="section-title">
                            <i class="fas fa-history"></i>
                            <span>آخر الأنشطة</span>
                        </div>
                        ${activities.map(activity => `
                            <div class="activity-item">
                                <div class="activity-icon" style="background: rgba(0,255,255,0.1);">
                                    <i class="fas ${getActivityIcon(activity.action)}"></i>
                                </div>
                                <div class="activity-details">
                                    <div class="activity-text">${activity.username || 'مستخدم'} - ${getActivityText(activity.action)}</div>
                                    <div class="activity-time">${formatTime(activity.timestamp)}</div>
                                </div>
                            </div>
                        `).join('')}
                        ${activities.length === 0 ? '<p style="text-align: center; color: var(--text-muted);">لا توجد أنشطة حديثة</p>' : ''}
                    </div>
                `;
                
                document.getElementById('pageContent').innerHTML = html;
                
                // رسم الرسوم البيانية
                setTimeout(() => {
                    if (document.getElementById('reportsChart')) {
                        if (charts.reports) charts.reports.destroy();
                        charts.reports = new Chart(document.getElementById('reportsChart'), {
                            type: 'line',
                            data: {
                                labels: Object.keys(reportsByMonth),
                                datasets: [{
                                    label: 'عدد التقارير',
                                    data: Object.values(reportsByMonth),
                                    borderColor: '#00ffff',
                                    backgroundColor: 'rgba(0, 255, 255, 0.1)',
                                    tension: 0.4,
                                    fill: true
                                }]
                            },
                            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#fff' } } }, scales: { y: { ticks: { color: '#fff' } }, x: { ticks: { color: '#fff' } } } }
                        });
                    }
                    
                    if (document.getElementById('notificationsChart')) {
                        if (charts.notifications) charts.notifications.destroy();
                        charts.notifications = new Chart(document.getElementById('notificationsChart'), {
                            type: 'doughnut',
                            data: {
                                labels: Object.keys(notificationsByType),
                                datasets: [{
                                    data: Object.values(notificationsByType),
                                    backgroundColor: ['#00ffff', '#a855f7', '#f97316', '#10b981']
                                }]
                            },
                            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
                        });
                    }
                }, 100);
                
            } catch (error) {
                console.error('خطأ:', error);
                document.getElementById('pageContent').innerHTML = `<div class="pending-approvals"><p style="color: var(--neon-red);">حدث خطأ في تحميل البيانات: ${error.message}</p></div>`;
            }
        }
        
        function getTypeName(type) {
            const names = {
                'notification': 'إخطار',
                'report': 'تقرير',
                'task': 'تكليف',
                'direction': 'توجيه'
            };
            return names[type] || type;
        }
        
        function getActivityIcon(action) {
            const icons = {
                'login': 'fa-sign-in-alt',
                'create_notification': 'fa-bell',
                'create_report': 'fa-file-alt',
                'create_task': 'fa-tasks',
                'approve': 'fa-check-circle',
                'reject': 'fa-times-circle'
            };
            return icons[action] || 'fa-circle';
        }
        
        function getActivityText(action) {
            const texts = {
                'login': 'قام بتسجيل الدخول',
                'create_notification': 'أنشأ إخطاراً جديداً',
                'create_report': 'أنشأ تقريراً جديداً',
                'create_task': 'أنشأ تكليفاً جديداً',
                'approve': 'قام باعتماد طلب',
                'reject': 'قام برفض طلب'
            };
            return texts[action] || action;
        }
        
        function formatTime(timestamp) {
            if (!timestamp) return 'منذ قليل';
            if (timestamp.toDate) {
                const date = timestamp.toDate();
                const now = new Date();
                const diff = Math.floor((now - date) / 1000);
                if (diff < 60) return 'منذ لحظات';
                if (diff < 3600) return `منذ ${Math.floor(diff / 60)} دقيقة`;
                if (diff < 86400) return `منذ ${Math.floor(diff / 3600)} ساعة`;
                return date.toLocaleDateString('ar-EG');
            }
            return 'منذ قليل';
        }
        
        // =====================================================================
        // دوال الاعتماد
        // =====================================================================
        window.approveItem = async function(id, type) {
            const { value: comment } = await Swal.fire({
                title: 'اعتماد',
                text: 'أضف تعليقاً (اختياري)',
                input: 'textarea',
                inputPlaceholder: 'اكتب تعليقك هنا...',
                showCancelButton: true,
                confirmButtonText: 'اعتماد',
                cancelButtonText: 'إلغاء',
                background: '#030514',
                confirmButtonColor: '#00ffff'
            });
            
            try {
                const collection = type === 'notification' ? 'Notifications' : 
                                  type === 'report' ? 'Reports' : 
                                  type === 'task' ? 'Tasks' : 'Directions';
                
                await db.collection(collection).doc(id).update({
                    status: 'approved',
                    approvedBy: currentUser.userId,
                    approvedByName: currentUser.name || currentUser.username,
                    approvalComment: comment || '',
                    approvalDate: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                Swal.fire({ icon: 'success', title: 'تم الاعتماد', text: 'تم اعتماد الطلب بنجاح', background: '#030514', confirmButtonColor: '#00ffff', timer: 1500, showConfirmButton: false });
                refreshData();
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: error.message, background: '#030514', confirmButtonColor: '#00ffff' });
            }
        };
        
        window.rejectItem = async function(id, type) {
            const { value: comment } = await Swal.fire({
                title: 'رفض',
                text: 'اكتب سبب الرفض',
                input: 'textarea',
                inputPlaceholder: 'سبب الرفض...',
                showCancelButton: true,
                confirmButtonText: 'رفض',
                cancelButtonText: 'إلغاء',
                background: '#030514',
                confirmButtonColor: '#ef4444'
            });
            
            if (!comment) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'يجب كتابة سبب الرفض', background: '#030514', confirmButtonColor: '#00ffff' });
                return;
            }
            
            try {
                const collection = type === 'notification' ? 'Notifications' : 
                                  type === 'report' ? 'Reports' : 
                                  type === 'task' ? 'Tasks' : 'Directions';
                
                await db.collection(collection).doc(id).update({
                    status: 'rejected',
                    rejectionComment: comment,
                    rejectedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    rejectedBy: currentUser.userId,
                    rejectedByName: currentUser.name || currentUser.username
                });
                
                Swal.fire({ icon: 'success', title: 'تم الرفض', text: 'تم رفض الطلب', background: '#030514', confirmButtonColor: '#00ffff', timer: 1500, showConfirmButton: false });
                refreshData();
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: error.message, background: '#030514', confirmButtonColor: '#00ffff' });
            }
        };
        
        // =====================================================================
        // دوال عامة
        // =====================================================================
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('show');
        }
        
        function refreshData() {
            loadDashboardData();
        }
        
        window.toggleSidebar = toggleSidebar;
        window.refreshData = refreshData;
        
        // =====================================================================
        // التهيئة
        // =====================================================================
        window.addEventListener('load', async function() {
            await loadUserInfo();
            await loadDashboardData();
            
            document.querySelectorAll('.nav-item[data-page]').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (btn.classList.contains('logout-btn')) return;
                    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    // يمكن إضافة التنقل بين الصفحات لاحقاً
                });
            });
            
            document.getElementById('logoutBtn').addEventListener('click', () => {
                localStorage.removeItem('currentUser');
                localStorage.removeItem('currentUserId');
                localStorage.removeItem('currentUserRole');
                localStorage.removeItem('currentUserName');
                window.location.href = 'login.html';
            });
        });
    </script>
</body>
