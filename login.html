<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>تسجيل الدخول - نظام إدارة النقابة المتكامل | ITWS</title>
    
    <!-- الخطوط الأساسية -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@400;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <!-- FingerprintJS لتحديد الأجهزة الفريدة -->
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    
    <!-- bcryptjs للتشفير الآمن -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        /* =====================================================================
           نظام إدارة النقابة المتكامل - شاشة تسجيل الدخول
           جميع الحقوق محفوظة لنقابة تكنولوجيا المعلومات والبرمجيات © 2026
           ===================================================================== */
        
        :root {
            --bg-deep: #030514;
            --bg-dark: #0a0f1f;
            --bg-medium: #111827;
            --bg-light: #1e293b;
            --bg-card: rgba(15, 23, 42, 0.35);
            --bg-card-solid: #0f172a;
            
            --neon-cyan: #00ffff;
            --neon-cyan-light: #7fffff;
            --neon-cyan-dark: #00cccc;
            --neon-cyan-glow: rgba(0, 255, 255, 0.7);
            
            --neon-purple: #a855f7;
            --neon-purple-light: #c084fc;
            --neon-purple-dark: #9333ea;
            --neon-purple-glow: rgba(168, 85, 247, 0.7);
            
            --neon-pink: #ec4899;
            --neon-pink-glow: rgba(236, 72, 153, 0.7);
            
            --neon-green: #10b981;
            --neon-green-glow: rgba(16, 185, 129, 0.7);
            
            --neon-red: #ef4444;
            --neon-red-glow: rgba(239, 68, 68, 0.7);
            
            --neon-orange: #f97316;
            --neon-orange-glow: rgba(249, 115, 22, 0.7);
            
            --neon-blue: #3b82f6;
            --neon-blue-glow: rgba(59, 130, 246, 0.7);
            
            --gradient-prime: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
            --gradient-success: linear-gradient(135deg, var(--neon-green), var(--neon-cyan));
            --gradient-danger: linear-gradient(135deg, var(--neon-red), var(--neon-orange));
            --gradient-warning: linear-gradient(135deg, var(--neon-orange), var(--neon-pink));
            
            --shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 10px 20px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.5);
            --shadow-xl: 0 30px 60px rgba(0, 0, 0, 0.6);
            --shadow-neon: 0 0 30px var(--neon-cyan), 0 0 60px var(--neon-purple);
            --shadow-neon-strong: 0 0 50px var(--neon-cyan), 0 0 100px var(--neon-purple);
            
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --space-2xl: 40px;
            
            --text-xs: 12px;
            --text-sm: 14px;
            --text-md: 16px;
            --text-lg: 18px;
            --text-xl: 20px;
            --text-2xl: 24px;
            --text-3xl: 30px;
            --text-4xl: 36px;
            
            --transition-fast: 0.2s;
            --transition-normal: 0.3s;
            --transition-slow: 0.5s;
            
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
            --ease-elastic: cubic-bezier(0.68, -0.6, 0.32, 1.6);
            
            --border-color: rgba(255, 255, 255, 0.1);
            --border-radius-md: 16px;
            --border-radius-lg: 24px;
            --border-radius-xl: 32px;
            --border-radius-2xl: 40px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', 'Cairo', sans-serif;
            background: var(--bg-deep);
            color: #ffffff;
            direction: rtl;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            line-height: 1.6;
        }
        
        /* خلفية متحركة سينمائية */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
            animation: cosmicDrift 40s ease-in-out infinite alternate;
            z-index: -2;
            pointer-events: none;
        }
        
        @keyframes cosmicDrift {
            0% { opacity: 0.5; transform: scale(1); filter: hue-rotate(0deg); }
            50% { opacity: 0.8; transform: scale(1.05); filter: hue-rotate(10deg); }
            100% { opacity: 0.5; transform: scale(1); filter: hue-rotate(0deg); }
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(168, 85, 247, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 40s linear infinite;
            z-index: -1;
            pointer-events: none;
        }
        
        @keyframes gridMove {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(60px) translateX(40px); }
        }
        
        /* جزيئات متطايرة فاخرة */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            border-radius: 50%;
            animation: particleFloat 25s linear infinite;
            opacity: 0.4;
            box-shadow: 0 0 15px var(--neon-cyan);
        }
        
        @keyframes particleFloat {
            0% { transform: translateY(100vh) translateX(0) rotate(0deg); opacity: 0.4; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100vh) translateX(150px) rotate(720deg); opacity: 0; }
        }
        
        /* الحاوية الرئيسية */
        .login-container {
            max-width: 500px;
            margin: 60px auto;
            position: relative;
            z-index: 10;
            padding: 20px;
        }
        
        /* الهيدر */
        .login-header {
            text-align: center;
            margin-bottom: 40px;
            animation: headerAppear 1.2s var(--ease-elastic);
        }
        
        @keyframes headerAppear {
            0% { opacity: 0; transform: translateY(-50px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .login-logo-wrapper {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            position: relative;
        }
        
        .login-logo-wrapper::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, var(--neon-cyan), var(--neon-purple), var(--neon-pink), transparent);
            animation: rotateConic 8s linear infinite;
            mask: radial-gradient(circle, transparent 60%, black 61%);
            -webkit-mask: radial-gradient(circle, transparent 60%, black 61%);
        }
        
        @keyframes rotateConic {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .login-logo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid var(--neon-cyan);
            box-shadow: 0 0 40px var(--neon-cyan);
            object-fit: cover;
            position: relative;
            z-index: 2;
        }
        
        .login-title {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            letter-spacing: 2px;
            animation: titleGlow 3s ease-in-out infinite;
        }
        
        @keyframes titleGlow {
            0% { filter: drop-shadow(0 0 20px var(--neon-cyan)); }
            50% { filter: drop-shadow(0 0 40px var(--neon-purple)); }
            100% { filter: drop-shadow(0 0 20px var(--neon-cyan)); }
        }
        
        .login-subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        /* كارت تسجيل الدخول */
        .login-card {
            background: rgba(15, 23, 42, 0.35);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(0, 255, 255, 0.2);
            border-radius: 50px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(0, 255, 255, 0.1) inset;
            animation: cardAppear 1s var(--ease-smooth);
            position: relative;
            overflow: hidden;
        }
        
        .login-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.1), transparent 70%);
            animation: cardRotate 20s linear infinite;
            pointer-events: none;
        }
        
        @keyframes cardRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* تبويبات تسجيل الدخول */
        .login-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            border-radius: 50px;
        }
        
        .login-tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 40px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .login-tab.active {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            color: white;
            box-shadow: 0 0 20px var(--neon-cyan);
        }
        
        .login-tab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        /* حقول الإدخال */
        .input-group {
            margin-bottom: 25px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
        }
        
        .input-group label i {
            color: var(--neon-cyan);
            margin-left: 10px;
            width: 25px;
        }
        
        .neon-input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(3, 5, 20, 0.6);
            border: 2px solid var(--border-color);
            border-radius: 30px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }
        
        .neon-input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 25px var(--neon-cyan);
            transform: translateY(-2px);
        }
        
        .neon-input:hover {
            border-color: var(--neon-purple);
        }
        
        /* زر تسجيل الدخول */
        .login-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s var(--ease-bounce);
            position: relative;
            overflow: hidden;
            margin-top: 20px;
        }
        
        .login-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .login-btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .login-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 40px var(--neon-cyan), 0 0 80px var(--neon-purple);
        }
        
        /* معلومات إضافية */
        .login-info {
            text-align: center;
            margin-top: 25px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
        }
        
        /* تذييل */
        .login-footer {
            text-align: center;
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
        }
        
        .version {
            font-family: 'Orbitron', monospace;
            color: var(--neon-cyan);
            margin-top: 10px;
        }
        
        /* شريط التقدم */
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
            display: none;
        }
        
        .progress-bar.show {
            display: block;
        }
        
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        
        /* رسالة الحالة */
        .status-message {
            text-align: center;
            padding: 12px;
            border-radius: 30px;
            margin-top: 15px;
            display: none;
            font-size: 14px;
        }
        
        .status-message.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        .status-message.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
        }
        
        .status-message.success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @media (max-width: 768px) {
            .login-container {
                margin: 30px auto;
                padding: 15px;
            }
            .login-card {
                padding: 30px;
            }
            .login-title {
                font-size: 28px;
            }
            .login-logo-wrapper {
                width: 100px;
                height: 100px;
            }
            .login-tab {
                padding: 8px;
                font-size: 14px;
            }
        }
        
        @media (max-width: 480px) {
            .login-card {
                padding: 25px;
            }
            .login-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- جزيئات متطايرة -->
    <div class="particles" id="particles"></div>
    
    <div class="login-container">
        <!-- الهيدر -->
        <div class="login-header">
            <div class="login-logo-wrapper">
                <img src="https://placehold.co/120x120/0a0f1f/00ffff/png?text=Logo" alt="شعار النقابة" class="login-logo" id="loginLogo">
            </div>
            <h1 class="login-title">نظام إدارة النقابة</h1>
            <p class="login-subtitle">تسجيل الدخول إلى المنصة المتكاملة</p>
        </div>
        
        <!-- كارت تسجيل الدخول -->
        <div class="login-card">
            <!-- تبويبات تسجيل الدخول -->
            <div class="login-tabs">
                <button class="login-tab active" onclick="switchTab('credentials')">
                    <i class="fas fa-user"></i> بيانات الاعتماد
                </button>
                <button class="login-tab" onclick="switchTab('phone')">
                    <i class="fas fa-phone-alt"></i> رقم الهاتف
                </button>
            </div>
            
            <!-- نموذج بيانات الاعتماد -->
            <div id="credentialsTab">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> اسم المستخدم</label>
                    <input type="text" id="credUsername" class="neon-input" placeholder="أدخل اسم المستخدم" onkeydown="handleLoginKeyDown(event, 'cred')">
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> كلمة المرور</label>
                    <input type="password" id="credPassword" class="neon-input" placeholder="أدخل كلمة المرور" onkeydown="handleLoginKeyDown(event, 'cred')">
                </div>
            </div>
            
            <!-- نموذج رقم الهاتف -->
            <div id="phoneTab" style="display: none;">
                <div class="input-group">
                    <label><i class="fas fa-phone-alt"></i> رقم الهاتف</label>
                    <input type="tel" id="phoneNumber" class="neon-input" placeholder="01xxxxxxxxx" onkeydown="handleLoginKeyDown(event, 'phone')">
                </div>
            </div>
            
            <!-- شريط التقدم -->
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            
            <!-- رسالة الحالة -->
            <div class="status-message" id="statusMessage"></div>
            
            <!-- زر تسجيل الدخول -->
            <button class="login-btn" onclick="handleLogin()">
                <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
            </button>
        </div>
        
        <!-- تذييل -->
        <div class="login-footer">
            <p>نقابة تكنولوجيا المعلومات والبرمجيات © 2026</p>
            <p class="version">VR 2.05.2026 | نظام إدارة متكامل</p>
        </div>
    </div>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script>
        // =====================================================================
        // تهيئة Firebase
        // =====================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDfKqDoA5TVqWWCF3M1L1Opj7MuoYmqMN0",
            authDomain: "itwssy.firebaseapp.com",
            databaseURL: "https://itwssy-default-rtdb.firebaseio.com",
            projectId: "itwssy",
            storageBucket: "itwssy.firebasestorage.app",
            messagingSenderId: "459373398439",
            appId: "1:459373398439:web:95772127d406196afb8e82",
            measurementId: "G-ZBBGHCXEEJ"
        };
        
        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // تفعيل التخزين المؤقت
        db.settings({ 
            cacheSizeBytes: firebase.firestore.CACHE_SIZE_UNLIMITED,
            ignoreUndefinedProperties: true
        });
        
        // =====================================================================
        // المتغيرات العامة
        // =====================================================================
        let currentTab = 'credentials';
        let loginAttempts = 0;
        let lastLoginAttempt = 0;
        
        // =====================================================================
        // دوال مساعدة
        // =====================================================================
        function showMessage(type, text) {
            const messageEl = document.getElementById('statusMessage');
            messageEl.className = 'status-message show ' + type;
            messageEl.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i> ${text}`;
            
            setTimeout(() => {
                messageEl.classList.remove('show');
            }, 5000);
        }
        
        function showProgress(show) {
            const progressBar = document.getElementById('progressBar');
            if (show) {
                progressBar.classList.add('show');
            } else {
                progressBar.classList.remove('show');
            }
        }
        
        function updateProgress(percent) {
            const progressFill = document.getElementById('progressFill');
            progressFill.style.width = percent + '%';
        }
        
        function switchTab(tab) {
            currentTab = tab;
            
            const credentialsTab = document.getElementById('credentialsTab');
            const phoneTab = document.getElementById('phoneTab');
            const tabs = document.querySelectorAll('.login-tab');
            
            if (tab === 'credentials') {
                credentialsTab.style.display = 'block';
                phoneTab.style.display = 'none';
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                credentialsTab.style.display = 'none';
                phoneTab.style.display = 'block';
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
        }
        
        function handleLoginKeyDown(event, type) {
            if (event.key === 'Enter') {
                handleLogin();
            }
        }
        
        // =====================================================================
        // إنشاء الجزيئات
        // =====================================================================
        function createParticles() {
            const container = document.getElementById('particles');
            if (!container) return;
            
            for (let i = 0; i < 60; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 15 + 's';
                p.style.animationDuration = 20 + Math.random() * 20 + 's';
                container.appendChild(p);
            }
        }
        createParticles();
        
        // =====================================================================
        // تحميل اللوجو المحفوظ
        // =====================================================================
        function loadSavedLogo() {
            const savedLogo = localStorage.getItem('union_logo_url');
            if (savedLogo) {
                document.getElementById('loginLogo').src = savedLogo;
            }
        }
        loadSavedLogo();
        
        // =====================================================================
        // الحصول على معلومات الجهاز
        // =====================================================================
        async function getDeviceInfo() {
            const ua = navigator.userAgent;
            
            let deviceType = 'desktop';
            if (/mobile|android|iphone|ipad|ipod/i.test(ua)) {
                deviceType = /ipad|tablet/i.test(ua) ? 'tablet' : 'mobile';
            }
            
            let os = 'Unknown';
            if (ua.indexOf('Windows') > -1) os = 'Windows';
            else if (ua.indexOf('Android') > -1) os = 'Android';
            else if (ua.indexOf('iPhone') > -1 || ua.indexOf('iPad') > -1) os = 'iOS';
            else if (ua.indexOf('Mac') > -1) os = 'MacOS';
            else if (ua.indexOf('Linux') > -1) os = 'Linux';
            
            let browser = 'Unknown';
            if (ua.indexOf('Chrome') > -1) browser = 'Chrome';
            else if (ua.indexOf('Firefox') > -1) browser = 'Firefox';
            else if (ua.indexOf('Safari') > -1) browser = 'Safari';
            else if (ua.indexOf('Edge') > -1) browser = 'Edge';
            
            let fingerprint = null;
            try {
                const fp = await FingerprintJS.load();
                const result = await fp.get();
                fingerprint = result.visitorId;
            } catch (error) {
                fingerprint = 'unknown_' + Date.now();
            }
            
            return {
                type: deviceType,
                os: os,
                browser: browser,
                screen: `${window.screen.width}×${window.screen.height}`,
                language: navigator.language,
                fingerprint: fingerprint
            };
        }
        
        // =====================================================================
        // تسجيل نشاط تسجيل الدخول
        // =====================================================================
        async function logLoginActivity(userId, username, role) {
            try {
                const deviceInfo = await getDeviceInfo();
                
                await db.collection('SystemLogs').add({
                    userId: userId,
                    username: username,
                    role: role,
                    action: 'login',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    deviceInfo: deviceInfo,
                    userAgent: navigator.userAgent,
                    ip: 'client-side'
                });
            } catch (error) {
                console.error('خطأ في تسجيل النشاط:', error);
            }
        }
        
        // =====================================================================
        // تسجيل الدخول (100% من قاعدة البيانات - بدون أي بيانات وهمية)
        // =====================================================================
        async function handleLogin() {
            // منع الهجمات المتكررة
            const now = Date.now();
            if (now - lastLoginAttempt < 2000 && loginAttempts >= 3) {
                showMessage('error', 'الرجاء الانتظار قبل المحاولة مرة أخرى');
                return;
            }
            
            lastLoginAttempt = now;
            loginAttempts++;
            
            let username, password;
            
            if (currentTab === 'credentials') {
                username = document.getElementById('credUsername')?.value.trim();
                password = document.getElementById('credPassword')?.value.trim();
                
                if (!username || !password) {
                    showMessage('error', 'الرجاء إدخال اسم المستخدم وكلمة المرور');
                    return;
                }
            } else {
                const phone = document.getElementById('phoneNumber')?.value.trim();
                if (!phone) {
                    showMessage('error', 'الرجاء إدخال رقم الهاتف');
                    return;
                }
                username = phone;
                password = phone;
            }
            
            showProgress(true);
            updateProgress(20);
            
            try {
                // البحث عن المستخدم في قاعدة البيانات فقط
                let query;
                if (currentTab === 'credentials') {
                    query = db.collection('Users').where('username', '==', username).where('isActive', '==', true);
                } else {
                    query = db.collection('Users').where('phone', '==', username).where('isActive', '==', true);
                }
                
                const userSnapshot = await query.get();
                
                updateProgress(60);
                
                if (userSnapshot.empty) {
                    showProgress(false);
                    showMessage('error', 'اسم المستخدم أو رقم الهاتف غير صحيح');
                    return;
                }
                
                const userDoc = userSnapshot.docs[0];
                const userData = userDoc.data();
                
                updateProgress(75);
                
                // التحقق من كلمة المرور باستخدام bcrypt فقط (من قاعدة البيانات)
                let isValid = false;
                
                if (currentTab === 'credentials') {
                    // استخدام bcrypt للمقارنة مع كلمة المرور المخزنة في قاعدة البيانات
                    if (userData.password) {
                        if (typeof bcrypt !== 'undefined' && userData.password.startsWith('$2')) {
                            isValid = await bcrypt.compare(password, userData.password);
                        } else {
                            // إذا كانت كلمة المرور غير مشفرة (للتوافق مع الإصدارات القديمة)
                            // في الإنتاج، كل كلمات المرور يجب أن تكون مشفرة بـ bcrypt
                            isValid = (userData.password === password);
                        }
                    }
                } else {
                    // التحقق من رقم الهاتف
                    isValid = (userData.phone === password);
                }
                
                updateProgress(90);
                
                if (!isValid) {
                    showProgress(false);
                    showMessage('error', 'كلمة المرور غير صحيحة');
                    return;
                }
                
                // تحديث آخر دخول
                const nowDate = new Date();
                const lastLoginStr = nowDate.toLocaleString('ar-EG');
                
                await db.collection('Users').doc(userDoc.id).update({
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                    lastLoginString: lastLoginStr,
                    lastLoginDevice: await getDeviceInfo()
                });
                
                // حفظ بيانات الجلسة
                const sessionData = {
                    userId: userDoc.id,
                    username: userData.username,
                    name: userData.name,
                    role: userData.role,
                    branchId: userData.branchId || null,
                    committeeId: userData.committeeId || null,
                    permissions: userData.permissions || {},
                    lastLogin: lastLoginStr
                };
                
                localStorage.setItem('currentUser', JSON.stringify(sessionData));
                localStorage.setItem('currentUserId', userDoc.id);
                localStorage.setItem('currentUserRole', userData.role);
                localStorage.setItem('currentUserName', userData.name || userData.username);
                
                updateProgress(100);
                
                // تسجيل نشاط تسجيل الدخول
                await logLoginActivity(userDoc.id, userData.username, userData.role);
                
                showProgress(false);
                
                // إظهار رسالة نجاح والانتقال حسب الصلاحية
                Swal.fire({
                    icon: 'success',
                    title: 'مرحباً بك',
                    html: `
                        <div style="text-align: center;">
                            <p style="color: #00ffff; font-size: 22px;">${userData.name || userData.username}</p>
                            <p style="color: rgba(255,255,255,0.8); margin-top: 10px;">الدور: ${getRoleName(userData.role)}</p>
                            <p style="color: rgba(255,255,255,0.6); margin-top: 5px;">جاري تحويلك إلى لوحة التحكم...</p>
                        </div>
                    `,
                    timer: 2000,
                    showConfirmButton: false,
                    background: '#030514',
                    color: '#fff'
                }).then(() => {
                    window.location.href = 'dashboard.html';
                });
                
            } catch (error) {
                console.error('خطأ في تسجيل الدخول:', error);
                showProgress(false);
                showMessage('error', error.message || 'حدث خطأ في تسجيل الدخول');
            }
        }
        
        // =====================================================================
        // الحصول على اسم الدور بالعربية
        // =====================================================================
        function getRoleName(role) {
            const roles = {
                'super_admin': 'النقيب العام',
                'president': 'رئيس النقابة',
                'branch_manager': 'مدير فرع',
                'committee_manager': 'مدير لجنة',
                'member': 'عضو',
                'public_relations': 'لجنة العلاقات العامة'
            };
            return roles[role] || role;
        }
        
        // =====================================================================
        // دوال عامة
        // =====================================================================
        window.switchTab = switchTab;
        window.handleLogin = handleLogin;
        window.handleLoginKeyDown = handleLoginKeyDown;
        
        // منع الكتابة بالعربي في رقم الهاتف
        document.getElementById('phoneNumber')?.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
