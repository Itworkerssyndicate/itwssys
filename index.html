<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>نظام إدارة النقابة المتكامل | ITWS | VR 2.05.2026</title>
    
    <!-- الخطوط الأساسية -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@400;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <style>
        /* =====================================================================
           نظام إدارة النقابة المتكامل - شاشة الإنترو
           جميع الحقوق محفوظة لنقابة تكنولوجيا المعلومات والبرمجيات © 2026
           ===================================================================== */
        
        :root {
            --bg-deep: #030514;
            --bg-dark: #0a0f1f;
            --bg-medium: #111827;
            --bg-light: #1e293b;
            --bg-card: rgba(15, 23, 42, 0.35);
            --bg-card-solid: #0f172a;
            
            --neon-cyan: #00ffff;
            --neon-cyan-light: #7fffff;
            --neon-cyan-dark: #00cccc;
            --neon-cyan-glow: rgba(0, 255, 255, 0.7);
            
            --neon-purple: #a855f7;
            --neon-purple-light: #c084fc;
            --neon-purple-dark: #9333ea;
            --neon-purple-glow: rgba(168, 85, 247, 0.7);
            
            --neon-pink: #ec4899;
            --neon-pink-glow: rgba(236, 72, 153, 0.7);
            
            --neon-green: #10b981;
            --neon-green-glow: rgba(16, 185, 129, 0.7);
            
            --neon-red: #ef4444;
            --neon-red-glow: rgba(239, 68, 68, 0.7);
            
            --neon-orange: #f97316;
            --neon-orange-glow: rgba(249, 115, 22, 0.7);
            
            --neon-blue: #3b82f6;
            --neon-blue-glow: rgba(59, 130, 246, 0.7);
            
            --gradient-prime: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
            --gradient-success: linear-gradient(135deg, var(--neon-green), var(--neon-cyan));
            --gradient-danger: linear-gradient(135deg, var(--neon-red), var(--neon-orange));
            --gradient-warning: linear-gradient(135deg, var(--neon-orange), var(--neon-pink));
            
            --shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 10px 20px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.5);
            --shadow-xl: 0 30px 60px rgba(0, 0, 0, 0.6);
            --shadow-neon: 0 0 30px var(--neon-cyan), 0 0 60px var(--neon-purple);
            --shadow-neon-strong: 0 0 50px var(--neon-cyan), 0 0 100px var(--neon-purple);
            
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --space-2xl: 40px;
            
            --text-xs: 12px;
            --text-sm: 14px;
            --text-md: 16px;
            --text-lg: 18px;
            --text-xl: 20px;
            --text-2xl: 24px;
            --text-3xl: 30px;
            --text-4xl: 36px;
            
            --transition-fast: 0.2s;
            --transition-normal: 0.3s;
            --transition-slow: 0.5s;
            
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
            --ease-elastic: cubic-bezier(0.68, -0.6, 0.32, 1.6);
            
            --border-color: rgba(255, 255, 255, 0.1);
            --border-radius-md: 16px;
            --border-radius-lg: 24px;
            --border-radius-xl: 32px;
            --border-radius-2xl: 40px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', 'Cairo', sans-serif;
            background: var(--bg-deep);
            color: #ffffff;
            direction: rtl;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            line-height: 1.6;
        }
        
        /* خلفية متحركة سينمائية */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
            animation: cosmicDrift 40s ease-in-out infinite alternate;
            z-index: -2;
            pointer-events: none;
        }
        
        @keyframes cosmicDrift {
            0% { opacity: 0.5; transform: scale(1); filter: hue-rotate(0deg); }
            50% { opacity: 0.8; transform: scale(1.05); filter: hue-rotate(10deg); }
            100% { opacity: 0.5; transform: scale(1); filter: hue-rotate(0deg); }
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(168, 85, 247, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 40s linear infinite;
            z-index: -1;
            pointer-events: none;
        }
        
        @keyframes gridMove {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(60px) translateX(40px); }
        }
        
        /* جزيئات متطايرة فاخرة */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            border-radius: 50%;
            animation: particleFloat 25s linear infinite;
            opacity: 0.4;
            box-shadow: 0 0 15px var(--neon-cyan);
        }
        
        @keyframes particleFloat {
            0% { transform: translateY(100vh) translateX(0) rotate(0deg); opacity: 0.4; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100vh) translateX(150px) rotate(720deg); opacity: 0; }
        }
        
        /* شاشة الإنترو */
        .intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #030514 0%, #0a0f1f 50%, #1a1f35 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            overflow: hidden;
        }
        
        .intro-screen.fade-out {
            animation: introFadeOut 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        
        @keyframes introFadeOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.1); visibility: hidden; }
        }
        
        .intro-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 30% 40%, rgba(0, 255, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(168, 85, 247, 0.15) 0%, transparent 50%);
            animation: introBgPulse 8s ease-in-out infinite;
        }
        
        @keyframes introBgPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }
        
        .intro-content {
            text-align: center;
            max-width: 800px;
            padding: 50px;
            position: relative;
            z-index: 10;
            background: rgba(3, 5, 20, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 80px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 255, 255, 0.2) inset;
            animation: introContentAppear 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes introContentAppear {
            0% { opacity: 0; transform: scale(0.8) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        /* حاوية اللوجو */
        .intro-logo-wrapper {
            width: 180px;
            height: 180px;
            margin: 0 auto 25px;
            position: relative;
        }
        
        .intro-logo-wrapper::before {
            content: '';
            position: absolute;
            top: -15px;
            left: -15px;
            right: -15px;
            bottom: -15px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, var(--neon-cyan), var(--neon-purple), var(--neon-pink), transparent);
            animation: rotateConic 8s linear infinite;
            mask: radial-gradient(circle, transparent 60%, black 61%);
            -webkit-mask: radial-gradient(circle, transparent 60%, black 61%);
        }
        
        @keyframes rotateConic {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .intro-logo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.1);
            object-fit: cover;
            position: relative;
            z-index: 2;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.4);
            animation: logoPulse 3s ease-in-out infinite;
        }
        
        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 0 40px rgba(0, 255, 255, 0.3); transform: scale(1); }
            50% { box-shadow: 0 0 70px rgba(168, 85, 247, 0.4); transform: scale(1.02); }
        }
        
        .intro-title {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
            letter-spacing: 2px;
            animation: titleShimmer 4s linear infinite;
            background-size: 200% auto;
        }
        
        @keyframes titleShimmer {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
        
        .intro-subtitle {
            font-size: 22px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 20px;
            position: relative;
            display: inline-block;
            padding: 0 25px;
        }
        
        .intro-subtitle::before,
        .intro-subtitle::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
        }
        
        .intro-subtitle::before {
            right: 100%;
        }
        
        .intro-subtitle::after {
            left: 100%;
        }
        
        .intro-role {
            font-size: 20px;
            color: var(--neon-cyan);
            margin-bottom: 8px;
            opacity: 0.9;
            letter-spacing: 1px;
        }
        
        .intro-name {
            font-size: 32px;
            font-weight: 800;
            color: white;
            margin-bottom: 35px;
            text-shadow: 0 0 20px var(--neon-purple);
        }
        
        /* محول متطور */
        .intro-loader-container {
            width: 320px;
            margin: 30px auto;
            position: relative;
        }
        
        .intro-loader-bg {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        
        .intro-loader-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
            border-radius: 10px;
            position: relative;
            transition: width 0.3s ease;
        }
        
        .intro-loader-fill::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 25px;
            height: 100%;
            background: white;
            filter: blur(8px);
            animation: loaderGlide 1.5s linear infinite;
        }
        
        @keyframes loaderGlide {
            0% { right: -25px; opacity: 0; }
            50% { opacity: 1; }
            100% { right: 100%; opacity: 0; }
        }
        
        .intro-percentage {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--neon-cyan);
            font-family: 'Orbitron', monospace;
            font-size: 16px;
            font-weight: 700;
            animation: percentagePulse 2s ease-in-out infinite;
        }
        
        @keyframes percentagePulse {
            0%, 100% { opacity: 0.7; text-shadow: 0 0 5px var(--neon-cyan); }
            50% { opacity: 1; text-shadow: 0 0 20px var(--neon-cyan); }
        }
        
        .intro-version {
            margin-top: 35px;
            font-family: 'Orbitron', monospace;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            letter-spacing: 2px;
        }
        
        .intro-skip {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: var(--neon-cyan);
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .intro-skip:hover {
            background: var(--neon-cyan);
            color: var(--bg-deep);
            transform: translateY(-3px);
            box-shadow: 0 0 40px var(--neon-cyan);
            border-color: transparent;
        }
        
        /* أنماط إضافية */
        .hidden {
            display: none !important;
        }
        
        @media (max-width: 768px) {
            .intro-logo-wrapper {
                width: 140px;
                height: 140px;
            }
            .intro-title {
                font-size: 36px;
            }
            .intro-name {
                font-size: 26px;
            }
            .intro-subtitle {
                font-size: 18px;
            }
            .intro-content {
                padding: 35px;
                margin: 20px;
            }
            .intro-skip {
                padding: 8px 20px;
                font-size: 14px;
            }
        }
        
        @media (max-width: 480px) {
            .intro-logo-wrapper {
                width: 120px;
                height: 120px;
            }
            .intro-title {
                font-size: 28px;
            }
            .intro-name {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <!-- جزيئات متطايرة -->
    <div class="particles" id="particles"></div>
    
    <!-- شاشة الإنترو -->
    <div class="intro-screen" id="introScreen">
        <div class="intro-bg"></div>
        
        <div class="intro-content">
            <div class="intro-logo-wrapper">
                <img src="https://placehold.co/180x180/0a0f1f/00ffff/png?text=Logo" alt="شعار النقابة" class="intro-logo" id="introLogo">
            </div>
            
            <h1 class="intro-title">نظام إدارة النقابة المتكامل</h1>
            <p class="intro-subtitle">نقابة تكنولوجيا المعلومات والبرمجيات</p>
            
            <div class="intro-role">النقيب العام</div>
            <div class="intro-name">المهندس / محمود جميل</div>
            
            <div class="intro-loader-container">
                <div class="intro-percentage" id="introPercentage">0%</div>
                <div class="intro-loader-bg">
                    <div class="intro-loader-fill" id="introLoaderFill"></div>
                </div>
            </div>
            
            <div class="intro-version">VR 2.05.2026 | نظام متكامل لإدارة النقابة</div>
        </div>
        
        <button class="intro-skip" onclick="skipIntro()">
            <i class="fas fa-forward"></i> تخطي
        </button>
    </div>
    
    <!-- المحتوى الرئيسي (سيظهر بعد الإنترو) -->
    <div id="mainApp" style="display: none;">
        <!-- سيتم تحميل المحتوى ديناميكياً -->
    </div>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script>
        // =====================================================================
        // شاشة الإنترو - نظام إدارة النقابة المتكامل
        // =====================================================================
        
        /**
         * تحديث نسبة التحميل في شاشة الإنترو
         */
        function updateIntroPercentage() {
            const percentageEl = document.getElementById('introPercentage');
            const loaderFill = document.getElementById('introLoaderFill');
            
            let percentage = 0;
            const interval = setInterval(() => {
                if (percentage < 100) {
                    percentage += 1;
                    if (percentageEl) percentageEl.textContent = percentage + '%';
                    if (loaderFill) loaderFill.style.width = percentage + '%';
                } else {
                    clearInterval(interval);
                    // بعد اكتمال التحميل، الانتقال لشاشة تسجيل الدخول
                    setTimeout(() => {
                        goToLogin();
                    }, 500);
                }
            }, 30);
        }
        
        /**
         * الانتقال إلى شاشة تسجيل الدخول
         */
        function goToLogin() {
            const introScreen = document.getElementById('introScreen');
            introScreen.classList.add('fade-out');
            
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1200);
        }
        
        /**
         * تخطي شاشة الإنترو
         */
        function skipIntro() {
            const introScreen = document.getElementById('introScreen');
            introScreen.classList.add('fade-out');
            
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 800);
        }
        
        /**
         * إنشاء الجزيئات المتطايرة
         */
        function createParticles() {
            const container = document.getElementById('particles');
            if (!container) return;
            
            for (let i = 0; i < 60; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 15 + 's';
                p.style.animationDuration = 20 + Math.random() * 20 + 's';
                container.appendChild(p);
            }
        }
        
        /**
         * تحميل اللوجو المحفوظ (من localStorage مؤقتاً)
         */
        function loadSavedLogo() {
            const savedLogo = localStorage.getItem('union_logo_url');
            if (savedLogo) {
                document.getElementById('introLogo').src = savedLogo;
            }
        }
        
        /**
         * تهيئة الصفحة
         */
        window.addEventListener('load', function() {
            createParticles();
            loadSavedLogo();
            updateIntroPercentage();
        });
    </script>
</body>
</html>
